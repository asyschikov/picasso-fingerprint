<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picasso - Device Class Fingerprinting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2.2em;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      font-size: 0.95em;
      margin-bottom: 36px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1.1em;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .fingerprint-display {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 2.4em;
      color: #4fc3f7;
      letter-spacing: 0.08em;
      word-break: break-all;
      text-align: center;
      padding: 20px 0;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .meta-item {
      padding: 12px 16px;
      background: #111;
      border-radius: 6px;
    }
    .meta-item.wide {
      grid-column: 1 / -1;
    }
    .meta-item .label {
      font-size: 0.75em;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .meta-item .value {
      font-size: 1.05em;
      color: #ccc;
      word-break: break-all;
    }
    .meta-item .value.highlight {
      color: #81c784;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #4fc3f7;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #29b6f6; }
    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .btn-row {
      text-align: center;
      margin: 24px 0;
    }
    .status {
      text-align: center;
      color: #888;
      font-size: 0.9em;
      min-height: 1.4em;
      margin-top: 8px;
    }
    #canvas-preview {
      display: block;
      margin: 16px auto;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      background: #fff;
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
    }
    .history-table th {
      text-align: left;
      padding: 8px 10px;
      color: #666;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 500;
    }
    .history-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #1e1e1e;
      color: #aaa;
      font-family: monospace;
    }
    @media (max-width: 600px) {
      .meta-grid { grid-template-columns: 1fr; }
      .fingerprint-display { font-size: 1.5em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Picasso</h1>
    <p class="subtitle">Lightweight Device Class Fingerprinting for Web Clients</p>

    <div class="card">
      <h2>Your Fingerprint</h2>
      <div class="fingerprint-display" id="fp-display">--------</div>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="label">Browser</div>
          <div class="value" id="meta-browser">-</div>
        </div>
        <div class="meta-item">
          <div class="label">Operating System</div>
          <div class="value" id="meta-os">-</div>
        </div>
        <div class="meta-item">
          <div class="label">Device Class</div>
          <div class="value highlight" id="meta-class">-</div>
        </div>
        <div class="meta-item">
          <div class="label">Compute Time</div>
          <div class="value" id="meta-time">-</div>
        </div>
        <div class="meta-item">
          <div class="label">Challenge (seed / rounds)</div>
          <div class="value" id="meta-challenge">-</div>
        </div>
        <div class="meta-item wide">
          <div class="label">User Agent</div>
          <div class="value" id="meta-ua" style="font-size:0.8em;">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Canvas Preview</h2>
      <canvas id="canvas-preview" width="200" height="200"></canvas>
    </div>

    <div class="btn-row">
      <input type="number" id="seed-input" placeholder="Seed (random)" style="
        padding: 12px 16px; background: #111; border: 1px solid #2a2a2a; border-radius: 6px;
        color: #e0e0e0; font-size: 1em; width: 180px; margin-right: 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
      ">
      <input type="number" id="rounds-input" placeholder="Rounds (1-4)" min="1" style="
        padding: 12px 16px; background: #111; border: 1px solid #2a2a2a; border-radius: 6px;
        color: #e0e0e0; font-size: 1em; width: 180px; margin-right: 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
      ">
      <label style="color: #888; font-size: 0.9em; margin-right: 12px; cursor: pointer;">
        <input type="checkbox" id="hidden-toggle" style="margin-right: 4px;">
        Hidden canvas
      </label>
      <button class="btn" id="run-btn" onclick="runPicasso()">Run Fingerprint</button>
    </div>
    <div class="status" id="status"></div>

    <div class="card" id="history-card" style="display:none;">
      <h2>Run History</h2>
      <table class="history-table">
        <thead>
          <tr><th>Seed</th><th>Rounds</th><th>Response</th><th>Time</th></tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
